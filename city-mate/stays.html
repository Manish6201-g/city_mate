<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affordable Stays - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1><i class="fas fa-city"></i> City Mate</h1>

                <li><a href="guides.html"><i class="fas fa-user-friends"></i> Guides</a></li>
                <li><a href="stays.html" class="active"><i class="fas fa-bed"></i> Stays</a></li>
                <li><a href="booking-form.html" class="btn-nav"><i class="fas fa-calendar-check"></i> Book Now</a></li>
                <li><a href="places.html"><i class="fas fa-map-marker-alt"></i> Places</a></li>

                <li><a href="budget.html"><i class="fas fa-calculator"></i> Budget</a></li>
                <li><a href="login.html" id="loginBtnNav" class="btn-nav"><i class="fas fa-sign-in-alt"></i> Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <h2><i class="fas fa-bed"></i> Affordable Stays</h2>
            <p>Mate Rates on budget hotels & homestays. Book instantly!</p>
        </section>

        <section class="search-section">
            <div style="position: relative;">
                <input type="text" id="staysSearch" placeholder="Search by city, price... e.g., '500' or 'mumbai'" oninput="filterStays()">
                <button class="search-btn" onclick="filterStays()"><i class="fas fa-search"></i></button>
            </div>
            <div id="stays-list" class="results-grid"></div>
        </section>
    </main>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2><i class="fas fa-calendar-check"></i> Book Now</h2>
            <h3 id="booking-item-name"></h3>
            <form id="bookingForm">
                <input type="hidden" id="booking-type" name="type">
                <input type="hidden" id="booking-item-details" name="itemDetails">
                <label>Name*:
                    <input type="text" name="customerName" required>
                </label>
                <label>Phone*:
                    <input type="tel" name="phone" required>
                </label>
                <label>Email:
                    <input type="email" name="email">
                </label>
                <label>Dates (e.g., 2024-12-01 to 2024-12-05):
                    <input type="text" name="dates" required>
                </label>
                <label>Guests:
                    <input type="number" name="guests" min="1" value="1">
                </label>
                <button type="button" onclick="saveBooking()">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
