<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #e2e8f0 100%);
            color: var(--text);
            line-height: 1.6;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: var(--surface);
            box-shadow: 2px 0 20px rgba(0,0,0,0.05);
            padding: 2rem 0;
            transition: transform 0.3s ease;
        }

        .logo {
            padding: 0 2rem 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .nav-item {
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-item.active, .nav-item:hover {
            background: var(--primary);
            color: white;
            border-right: 4px solid var(--primary-dark);
        }

        .nav-item i { width: 20px; margin-right: 1rem; }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
        }

        .login-form {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: var(--surface);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        .table-container {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f1f5f9;
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text);
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(99,102,241,0.02);
        }

        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status.pending { background: #fef3c7; color: #92400e; }
        .status.accepted { background: #d1fae5; color: #065f46; }
        .status.rejected { background: #fee2e2; color: #991b1b; }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                padding: 1rem;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1000;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu {
                display: block;
            }

            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                height: 100vh;
                z-index: 999;
                top: 0;
                left: 0;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <h1><i class="fas fa-city"></i> CityMate Admin</h1>
            </div>
            <nav>
                <a href="#" class="nav-item active" onclick="showSection('dashboard')">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="#" class="nav-item" onclick="showSection('bookings')">
                    <i class="fas fa-calendar-check"></i> Bookings
                </a>
                <a href="#" class="nav-item" onclick="showSection('reviews')">
                    <i class="fas fa-star"></i> Reviews
                </a>
                <a href="#" class="nav-item" onclick="showSection('contacts')">
                    <i class="fas fa-envelope"></i> Contacts
                </a>
                <a href="#" class="nav-item" onclick="showSection('reviews')">
                    <i class="fas fa-star"></i> Reviews
                </a>
                <a href="#" class="nav-item" onclick="showSection('contacts')">
                    <i class="fas fa-envelope"></i> Contacts
                </a>
                <a href="#" class="nav-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
                <div>
                    <span id="userEmail" style="font-weight: 500;"></span>
                </div>
            </header>

            <!-- Login Form -->
            <div id="loginSection" class="login-form">
                <h2><i class="fas fa-lock"></i> Admin Login</h2>
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@citymate.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="adminPassword" placeholder="admin123" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
            </div>

            <!-- Dashboard Content -->
            <div id="dashboardContent" style="display: none;">
                <div id="dashboardSection">
                    <h2>Overview</h2>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 1.5rem;">
                        <div style="background: var(--surface); padding: 2rem; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                            <div style="font-size: 2.5rem; color: var(--primary);">0</div>
                            <h3>Total Bookings</h3>
                        </div>
                        <div style="background: var(--surface); padding: 2rem; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                            <div style="font-size: 2.5rem; color: var(--success);">0</div>
                            <h3>Accepted</h3>
                        </div>
                        <div style="background: var(--surface); padding: 2rem; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                            <div style="font-size: 2.5rem; color: var(--warning);">0</div>
                            <h3>Pending</h3>
                        </div>
                    </div>
                </div>

                <div id="bookingsSection" style="display: none;">
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                        <button class="filter-btn active" data-status="all">All</button>
                        <button class="filter-btn" data-status="pending">Pending</button>
                        <button class="filter-btn" data-status="accepted">Accepted</button>
                        <button class="filter-btn" data-status="rejected">Rejected</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Service</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="bookingsTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        let token = localStorage.getItem('adminToken');
        let bookings = [];
        let currentFilter = 'all';

        // Check if logged in
        async function init() {
            if (token) {
                try {
                    await loadBookings();
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboardContent').style.display = 'block';
                    document.getElementById('userEmail').textContent = localStorage.getItem('adminEmail') || 'Admin';
                } catch (err) {
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminEmail');
                }
            }
        }

        // Login
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminEmail', data.email);
                    await loadBookings();
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboardContent').style.display = 'block';
                    document.getElementById('userEmail').textContent = data.email;
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('Server error - start backend server first');
            }
        });

        // Load bookings
        async function loadBookings(status = '') {
            try {
                const url = status ? `${API_BASE}/bookings?status=${status}` : `${API_BASE}/bookings`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                bookings = await res.json();
                renderBookings();
                updateStats();
            } catch (err) {
                console.error('Error loading bookings:', err);
            }
        }

        // Render table
        function renderBookings() {
            const tbody = document.getElementById('bookingsSection');
            const tableBody = document.getElementById('bookingsTable');
            tableBody.innerHTML = bookings.map(b => `
                <tr>
                    <td>${b.name || 'N/A'}</td>
                    <td>${b.email || 'N/A'}</td>
                    <td>${b.service || b.type?.toUpperCase() || 'N/A'}</td>
                    <td>${b.date || new Date(b.createdAt).toLocaleDateString()}</td>
                    <td><span class="status status-${b.status}">${b.status.toUpperCase()}</span></td>
                    <td>
                        <button class="btn btn-success" onclick="updateStatus('${b._id}', 'accepted')" style="padding: 0.5rem 1rem; font-size: 0.875rem; margin-right: 0.5rem;">Accept</button>
                        <button class="btn btn-danger" onclick="updateStatus('${b._id}', 'rejected')" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Reject</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="6" style="text-align: center; padding: 4rem; color: var(--text-muted);">No bookings found</td></tr>';
        }

        // Update status
        async function updateStatus(id, status) {
            try {
                const res = await fetch(`${API_BASE}/bookings/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                
                if (res.ok) {
                    await loadBookings(currentFilter);
                } else {
                    alert('Update failed');
                }
            } catch (err) {
                alert('Server error');
            }
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                e.target.classList.add('active');
                currentFilter = e.target.dataset.status;
                loadBookings(currentFilter === 'all' ? '' : currentFilter);
            });
        });

        // Stats
        function updateStats() {
            const total = bookings.length;
            const accepted = bookings.filter(b => b.status === 'accepted').length;
            const pending = bookings.filter(b => b.status === 'pending').length;
            
            document.querySelector('[data-stat="total"]').textContent = total;
            document.querySelector('[data-stat="accepted"]').textContent = accepted;
            document.querySelector('[data-stat="pending"]').textContent = pending;
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminEmail');
            location.reload();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Init
        init();
    </script>
</body>
</html>
