<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2><i class="fas fa-sign-in-alt"></i> City Mate Login</h2>
            
            <div class="role-selector">
                <button class="role-btn role-client active" onclick="selectRole('client')">Client</button>
                <button class="role-btn role-admin" onclick="selectRole('admin')">Admin</button>
            </div>
            
            <form id="loginForm">
                <div class="form-group" id="emailGroup">
                    <label>Email* (demo: test@test.com)</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group" id="passwordGroup" style="display:none;">
                    <label>Password* (demo: admin123)</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn login-btn" id="loginBtn">Login as Client</button>
            </form>
            
            <div class="demo-data">
                Client: any email | Admin: admin123
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentRole = 'client';
        
        function selectRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('loginBtn').textContent = `Login as ${role.charAt(0).toUpperCase() + role.slice(1)}`;
            document.getElementById('passwordGroup').style.display = role === 'admin' ? 'block' : 'none';
            if (role === 'client') document.getElementById('password').removeAttribute('required');
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Demo validation
            if (currentRole === 'client' || (currentRole === 'admin' && password === 'admin123')) {
                localStorage.setItem('cityMateUserRole', currentRole);
                localStorage.setItem('cityMateEmail', email);
                
                // Redirect based on role
                if (currentRole === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert('Wrong password!');
            }
        });
        
        // Auto-redirect if already logged
        if (localStorage.getItem('cityMateUserRole')) {
            const role = localStorage.getItem('cityMateUserRole');
            if (role === 'admin') window.location.href = 'admin.html';
            else window.location.href = 'index.html';
        }
    </script>
</body>
</html>
