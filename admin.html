<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <header>
        <nav class="navbar">
            <h1><i class="fas fa-city"></i> City Mate Admin</h1>
            <div>
                <a href="index.html" class="btn-nav" style="margin-right: auto;"><i class="fas fa-home"></i> Home</a>
                <span id="admin-welcome" style="display:none;"></span>
                <button class="logout" id="logout" onclick="logout()" style="display:none;">Logout</button>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <h2><i class="fas fa-users-cog"></i> Admin Dashboard</h2>
            <p>Manage all client bookings</p>
        </section>

        <section class="admin-login" id="loginSection">
            <h3>Admin Login</h3>
            <input type="password" id="adminPassword" placeholder="Enter password" style="width:100%; padding:1rem; margin:1rem 0; border:1px solid #ddd; border-radius:10px;">
            <button onclick="adminLogin()" class="btn" style="width:100%;">Login</button>
            <p style="color:#666; font-size:0.9rem; text-align:center;">Bookings: <span id="bookingCount">0</span></p>
        </section>

        <section id="adminDashboard" style="display:none; max-width:1400px; margin:2rem auto; padding:2rem; background:rgba(255,255,255,0.95); border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.2);">
            <h3>All Bookings (<span id="liveCount">0</span>)</h3>
            <input type="text" id="adminSearch" placeholder="Search bookings..." oninput="filterAdminBookings()" style="width:100%; padding:1rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:10px;">
            <table class="admin-table">
                <thead>
                    <tr>
<th>ID</th>
                        <th>Client</th>
                        <th>Type</th>
                        <th>Item</th>
                        <th>Duration</th>
                        <th>Dates</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminBookingsList">
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        const ADMIN_PASSWORD = 'admin123';
        
        function adminLogin() {
            const pw = document.getElementById('adminPassword').value;
            if (pw === ADMIN_PASSWORD) {
                localStorage.setItem('cityMateAdminLoggedIn', 'true');
                // Update all bookings to pending if no status
                bookings = bookings.map(b => ({...b, status: b.status || 'pending'}));
                localStorage.setItem('cityMateBookings', JSON.stringify(bookings));
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('admin-welcome').textContent = 'Welcome Admin';
                document.getElementById('admin-welcome').style.display = 'inline';
                document.getElementById('logout').style.display = 'inline-block';
                document.getElementById('bookingCount').textContent = bookings.length;
                renderAdminBookings();
            } else {
                alert('Wrong password!');
            }
        }
        
        function setStatus(id, status) {
            const booking = bookings.find(b => b.id == id);
            if (booking) {
                booking.status = status;
                localStorage.setItem('cityMateBookings', JSON.stringify(bookings));
                renderAdminBookings();
                alert(`Booking ${status.toUpperCase()}!`);
            }
        }

        function deleteBooking(id) {
            if (confirm('Delete booking?')) {
                bookings = bookings.filter(b => b.id != id);
                localStorage.setItem('cityMateBookings', JSON.stringify(bookings));
                renderAdminBookings();
                document.getElementById('liveCount').textContent = bookings.length;
                document.getElementById('bookingCount').textContent = bookings.length;
            }
        }

        function renderAdminBookings(filtered = bookings) {
            const tbody = document.getElementById('adminBookingsList');
            tbody.innerHTML = filtered.map(b => {
                const details = JSON.parse(b.itemDetails || '{}');
                return `
                    <tr>
                        <td>${b.id}</td>
                        <td>${b.customerName || 'N/A'}</td>
                        <td>${b.type?.toUpperCase()}</td>
                        <td>${details.name || 'N/A'}<br><small style="opacity: 0.8;">${details.city || ''} | ₹${details.price || ''}${b.type === 'stay' ? '/night' : b.type === 'guide' ? '/hr' : ''}</small></td>
                        <td>${b.guests || 'N/A'} ${b.type === 'stay' ? 'nights' : 'hours'}</td>
                        <td>${b.dates || 'N/A'}</td>
                        <td>${b.phone || 'N/A'}</td>
                        <td><span class="status ${b.status || 'pending'}">${b.status || 'Pending'}</span></td>
                        <td>
                          <button class="btn-action approve" onclick="setStatus('${b.id}', 'approved')">Approve</button>
                          <button class="btn-action reject" onclick="setStatus('${b.id}', 'rejected')">Reject</button>
                          <button class="btn-action delete" onclick="deleteBooking('${b.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
            document.getElementById('liveCount').textContent = filtered.length;
        }
        
        function filterAdminBookings() {
            const query = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = bookings.filter(b => 
                (b.customerName || '').toLowerCase().includes(query) ||
                b.type?.toLowerCase().includes(query) ||
                JSON.parse(b.itemDetails || '{}').name?.toLowerCase().includes(query) ||
                b.timestamp?.toLowerCase().includes(query)
            );
            renderAdminBookings(filtered);
        }
        
        function logout() {
            localStorage.removeItem('cityMateAdminLoggedIn');
            location.reload();
        }
        
        // Auto-login if already logged
        if (localStorage.getItem('cityMateAdminLoggedIn')) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            document.getElementById('admin-welcome').textContent = 'Welcome Admin';
            document.getElementById('admin-welcome').style.display = 'inline';
            document.getElementById('logout').style.display = 'inline-block';
            renderAdminBookings();
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('bookingCount').textContent = bookings.length;
        });
    </script>
</body>
</html>
