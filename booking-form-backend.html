<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="booking-container">
        <div class="booking-card">
<h2><i class="fas fa-calendar-check"></i> Complete Booking</h2>
            <h3 id="selected-item" class="accent-heading"></h3>
<form id="bookingForm" onsubmit="submitBooking(event)">
                <input type="hidden" id="booking-type" name="type">
                <input type="hidden" id="booking-item-details" name="itemDetails">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="customerName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" name="phone" required placeholder="98xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Date *</label>
                    <input type="date" name="dates" required>
                </div>
                <div class="form-group">
                    <label>Hours/Guests</label>
                    <input type="number" name="guests" min="1" value="4" placeholder="4">
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-check-circle"></i> SUBMIT BOOKING
                </button>
            </form>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
          const params = new URLSearchParams(window.location.search);
          const type = params.get('type');
          const itemStr = params.get('item');
          if (type && itemStr) {
            try {
              const item = JSON.parse(decodeURIComponent(itemStr));
              const selectedEl = document.getElementById('selected-item');
              if (selectedEl) selectedEl.textContent = `${item.name} (${type.toUpperCase()})`;
              const typeEl = document.getElementById('booking-type');
              if (typeEl) typeEl.value = type;
              const detailsEl = document.getElementById('booking-item-details');
              if (detailsEl) detailsEl.value = itemStr;
              // Prefill date
              const dateEl = document.querySelector('[name="dates"]');
              if (dateEl) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                dateEl.value = tomorrow.toISOString().split('T')[0];
              }
              // Adapt guests
              const guestsEl = document.querySelector('[name="guests"]');
              if (guestsEl) {
                guestsEl.placeholder = type === 'guide' ? 'Hours (default 4)' : 'Guests (default 2)';
              }
            } catch(e) { console.error('Parse error:', e); }
          }
        });

        async function submitBooking(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const bookingData = Object.fromEntries(formData);
            bookingData.timestamp = new Date().toLocaleString('en-IN');
            bookingData.status = 'pending';
            
            try {
                const response = await fetch('http://localhost:3001/api/bookings', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(bookingData)
                });
                if (response.ok) {
                    const result = await response.json();
                    alert('✅ Booking confirmed! ID: ' + (result._id || result.id) + '\nCheck Admin dashboard.');
                } else {
                    const err = await response.json();
                    alert('Server error: ' + err.message + '\nSaved locally.');
                    // Fallback
                    fallbackSave(bookingData);
                }
            } catch (err) {
                alert('Backend unavailable - saved locally. Check Admin panel.');
                fallbackSave(bookingData);
            }
            event.target.reset();
        }

        function fallbackSave(data) {
            data.id = 'B' + Date.now();
            let bookings = JSON.parse(localStorage.getItem('cityMateBookings') || '[]');
            bookings.unshift(data);
            localStorage.setItem('cityMateBookings', JSON.stringify(bookings));
        }
    </script>
</body>
</html>
