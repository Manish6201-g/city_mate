<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Calculator - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1><i class="fas fa-city"></i> City Mate</h1>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="guides.html"><i class="fas fa-user-friends"></i> Guides</a></li>
                <li><a href="stays.html"><i class="fas fa-bed"></i> Stays</a></li>
                <li><a href="places.html"><i class="fas fa-map-marker-alt"></i> Places</a></li>
                <li><a href="budget.html" class="active"><i class="fas fa-calculator"></i> Budget</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <h2><i class="fas fa-calculator"></i> Quick Budget Estimate</h2>
            <p>98% accurate forecast - just city & days!</p>
        </section>

        <section class="search-section" style="max-width: 600px; margin: auto;">
            <form id="budgetForm">
                <label>City:
                    <select id="city">
                        <option value="delhi">Delhi</option>
                        <option value="mumbai">Mumbai</option>
                        <option value="bangalore">Bangalore</option>
                    </select>
                </label>
                <label>Days: <input type="number" id="days" min="1" value="3"></label>
                <button type="button" onclick="calculateBudget()"><i class="fas fa-magic"></i> Estimate</button>
            </form>
            <div id="budget-breakdown">
                <div id="total" class="total-display">Total Estimated Cost: ₹0</div>
                <div id="breakdown-details" class="breakdown"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
