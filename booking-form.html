<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .booking-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .booking-card { 
            background: var(--glass-card); 
            backdrop-filter: blur(30px); 
            padding: 4rem; 
            border-radius: 30px; 
            box-shadow: var(--shadow-hover); 
            border: 1px solid var(--border-glass); 
            width: 100%; 
            max-width: 500px; 
            text-align: center; 
            color: var(--text-primary);
        }
        .booking-card h2 { font-size: 2.5rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 2rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.8rem; font-weight: 600; }
        .form-group input { 
            width: 100%; padding: 1.5rem; border: none; border-radius: 15px; 
            font-size: 1.1rem; background: var(--glass-bg); color: var(--text-primary);
            box-shadow: var(--shadow-light); transition: all 0.3s ease;
        }
        .form-group input:focus { box-shadow: 0 8px 30px rgba(59,130,246,0.4); transform: translateY(-2px); }
        .submit-btn { 
            width: 100%; padding: 2.5rem 3rem; background: linear-gradient(45deg, var(--accent-primary), #059669);
            color: white; border: none; border-radius: 25px; font-size: 1.8rem; font-weight: 800; 
            cursor: pointer; box-shadow: 0 20px 50px rgba(16,185,129,0.4); transition: all 0.4s ease;
            text-transform: uppercase; letter-spacing: 2px; margin-top: 2rem;
        }
        .submit-btn:hover { transform: translateY(-5px); box-shadow: 0 30px 70px rgba(16,185,129,0.6); }
        .back-btn { margin-top: 1.5rem; background: transparent; color: var(--text-primary); border: 2px solid var(--text-primary); padding: 1rem 2rem; border-radius: 25px; text-decoration: none; font-weight: 600; transition: all 0.3s; display: inline-block; }
        .back-btn:hover { background: var(--text-primary); color: var(--bg-gradient); }
    </style>
</head>
<body>
    <div class="booking-container">
        <div class="booking-card">
<h2><i class="fas fa-calendar-check"></i> Complete Booking</h2>
            <h3 id="selected-item" style="color: #3b82f6; margin: 1rem 0 2rem 0; font-size: 1.4rem;"></h3>
<form id="bookingForm" onsubmit="submitBooking(event)">
                <input type="hidden" id="booking-type" name="type">
                <input type="hidden" id="booking-item-details" name="itemDetails">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="customerName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" name="phone" required placeholder="98xxxxxxxx">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Date *</label>
                    <input type="date" name="dates" required>
                </div>
                <div class="form-group">
                    <label>Hours/Guests</label>
                    <input type="number" name="guests" min="1" value="4" placeholder="4">
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-check-circle"></i> SUBMIT BOOKING
                </button>
            </form>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
          const params = new URLSearchParams(window.location.search);
          const type = params.get('type');
          const itemStr = params.get('item');
          if (type && itemStr) {
            try {
              const item = JSON.parse(decodeURIComponent(itemStr));
              const selectedEl = document.getElementById('selected-item');
              if (selectedEl) selectedEl.textContent = `${item.name} (${type.toUpperCase()})`;
              const typeEl = document.getElementById('booking-type');
              if (typeEl) typeEl.value = type;
              const detailsEl = document.getElementById('booking-item-details');
              if (detailsEl) detailsEl.value = itemStr;
              // Prefill date
              const dateEl = document.querySelector('[name="dates"]');
              if (dateEl) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                dateEl.value = tomorrow.toISOString().split('T')[0];
              }
              // Adapt guests
              const guestsEl = document.querySelector('[name="guests"]');
              if (guestsEl) {
                guestsEl.placeholder = type === 'guide' ? 'Hours (default 4)' : 'Guests (default 2)';
              }
            } catch(e) { console.error('Parse error:', e); }
          }
        });

        function submitBooking(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const bookingData = {
                id: 'B' + Date.now(),
                ...Object.fromEntries(formData),
                timestamp: new Date().toLocaleString('en-IN'),
                status: 'confirmed',
                type: formData.get('type') || 'direct',
            };
            
            let bookings = JSON.parse(localStorage.getItem('cityMateBookings') || '[]');
            bookings.unshift(bookingData);
            localStorage.setItem('cityMateBookings', JSON.stringify(bookings, null, 2));
            
            alert('✅ Booking confirmed!\nID: ' + bookingData.id + '\nCheck Admin panel.');
            event.target.closest('form').reset();
        }
    </script>
</body>
</html>
