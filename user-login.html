<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2><i class="fas fa-user"></i> User Login</h2>
            
            <form id="userLoginForm">
                <div class="form-group">
                    <label>Email* (demo: user@email.com)</label>
                    <input type="email" id="userEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password* (demo: user123)</label>
                    <input type="password" id="userPassword" name="password" required>
                </div>
                <button type="submit" class="btn login-btn">User Login</button>
            </form>
            
            <div class="demo-data">
                Demo: user@email.com / user123
            </div>
            <p style="text-align: center; margin-top: 1rem;">
                <a href="login.html">Admin Login</a> | <a href="index.html">Back to Home</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('userLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('userEmail').value;
            const password = document.getElementById('userPassword').value;
            
            // Demo validation
            if (password === 'user123') {
                localStorage.setItem('cityMateUserLoggedIn', 'true');
                localStorage.setItem('cityMateUserEmail', email);
                window.location.href = 'index.html';
            } else {
                alert('Wrong password! Demo: user123');
            }
        });
        
        // Auto-redirect if already user logged
        if (localStorage.getItem('cityMateUserLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
