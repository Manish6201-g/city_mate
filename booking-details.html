<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Details - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .booking-details-section {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .booking-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }
        .booking-form-grid label {
            display: block;
            margin: 0.8rem 0;
            font-weight: 500;
        }
        .booking-form-grid input,
        .booking-form-grid select {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.3rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .payment-options label {
            display: block;
            margin: 0.8rem 0;
            cursor: pointer;
        }
        .payment-options input[type="radio"] {
            width: auto;
            margin-right: 0.5rem;
        }
        .discount-section {
            margin: 2rem 0;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .discount-section label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .discount-section input {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            flex: 1;
        }
        .discount-section button {
            padding: 0.8rem 1.5rem;
            margin-top: 0;
        }
        .total-section {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid #eee;
        }
        #booking-total {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 1rem;
        }
        .book-btn.large {
            font-size: 1.2rem;
            padding: 1rem 3rem;
        }
        @media (max-width: 768px) {
            .booking-form-grid { grid-template-columns: 1fr; }
            .booking-details-section { margin: 1rem; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <h1><i class="fas fa-city"></i> City Mate</h1>
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="guides.html"><i class="fas fa-user-friends"></i> Guides</a></li>
                <li><a href="stays.html"><i class="fas fa-bed"></i> Stays</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-hero">
            <h2><i class="fas fa-receipt"></i> Booking Details & Payment</h2>
        </section>

        <section class="booking-details-section">
            <div id="booking-summary" class="item">
                <h3>Booking Summary</h3>
            </div>

            <div class="booking-form-grid">
                <div>
                    <h3>Timings</h3>
                    <label>Check-in Date:
                        <input type="date" id="checkin-date">
                    </label>
                    <label>Check-out Date:
                        <input type="date" id="checkout-date">
                    </label>
                    <label>Time Slot:
                        <select id="time-slot">
                            <option>09:00-12:00</option>
                            <option>12:00-15:00</option>
                            <option>15:00-18:00</option>
                            <option>18:00-21:00</option>
                        </select>
                    </label>
                </div>

                <div>
                    <h3>Payment Method</h3>
                    <div class="payment-options">
                        <label><input type="radio" name="payment" value="upi" checked> UPI / GPay</label>
                        <label><input type="radio" name="payment" value="card"> Credit/Debit Card</label>
                        <label><input type="radio" name="payment" value="cash"> Cash on Arrival</label>
                    </div>
                </div>
            </div>

            <div class="discount-section">
                <label>Discount Code:
                    <input type="text" id="discount-code" placeholder="FIRST10 or MATE20" maxlength="10">
                    <button onclick="applyDiscount()">Apply</button>
                </label>
                <div id="discount-result"></div>
            </div>

            <div class="total-section">
                <div id="booking-total">Total: ₹0</div>
                <button class="book-btn large" onclick="confirmFinalBooking()">Confirm & Pay</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        let currentItem = {};
        let bookingType = '';
        let discountPercent = 0;

        document.addEventListener('DOMContentLoaded', initBookingDetails);

        function initBookingDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');
            const itemStr = urlParams.get('item');
            const tempBooking = JSON.parse(localStorage.getItem('tempBooking') || '{}');

            // Set min date to today
            const today = new Date().toISOString().split('T')[0];
            const checkinEl = document.getElementById('checkin-date');
            const checkoutEl = document.getElementById('checkout-date');
            if (checkinEl) checkinEl.min = today;
            if (checkoutEl) checkoutEl.min = today;

            if (itemStr && type) {
                currentItem = JSON.parse(decodeURIComponent(itemStr));
                bookingType = type;
                document.getElementById('booking-summary').innerHTML = `
                    <h3>${currentItem.name}</h3>
                    <p>${type.toUpperCase()} | ${currentItem.city} | ₹${currentItem.price} ${type === 'stay' ? '/night' : '/hr'}</p>
                    <p>${tempBooking.customerName || ''} ${tempBooking.phone ? '| ' + tempBooking.phone : ''}</p>
                `;
            }
            updateTotal();

            // Recalculate on date change
            if (checkinEl) checkinEl.addEventListener('change', updateTotal);
            if (checkoutEl) checkoutEl.addEventListener('change', updateTotal);
        }

        function updateTotal() {
            const checkin = document.getElementById('checkin-date').value;
            const checkout = document.getElementById('checkout-date').value;
            let amount = currentItem.price || 0;

            if (checkin && checkout) {
                const days = Math.max(1, Math.ceil((new Date(checkout) - new Date(checkin)) / (1000 * 60 * 60 * 24)));
                amount = (currentItem.price || 0) * days;
            }

            if (discountPercent > 0) {
                amount = amount - (amount * discountPercent / 100);
            }

            document.getElementById('booking-total').textContent = `Total: ₹${Math.round(amount)}`;
        }

        function applyDiscount() {
            const code = document.getElementById('discount-code').value.toUpperCase().trim();
            const resultEl = document.getElementById('discount-result');

            if (code === 'FIRST10') {
                discountPercent = 10;
                resultEl.innerHTML = '<span style="color: #10b981; font-weight: 600;">10% discount applied!</span>';
            } else if (code === 'MATE20') {
                discountPercent = 20;
                resultEl.innerHTML = '<span style="color: #10b981; font-weight: 600;">20% discount applied!</span>';
            } else {
                discountPercent = 0;
                resultEl.innerHTML = '<span style="color: #ef4444;">Invalid code. Try FIRST10 or MATE20.</span>';
            }
            updateTotal();
        }

        function confirmFinalBooking() {
            const checkin = document.getElementById('checkin-date').value;
            const checkout = document.getElementById('checkout-date').value;
            const payment = document.querySelector('input[name="payment"]:checked').value;
            const timeSlot = document.getElementById('time-slot').value;
            const tempBooking = JSON.parse(localStorage.getItem('tempBooking') || '{}');

            if (!checkin) {
                alert('Please select a check-in date.');
                return;
            }

            const bookingData = {
                id: 'B' + Date.now(),
                type: bookingType,
                itemDetails: JSON.stringify(currentItem),
                customerName: tempBooking.customerName || 'Guest',
                phone: tempBooking.phone || '',
                email: tempBooking.email || '',
                dates: checkin + (checkout ? ' to ' + checkout : ''),
                timeSlot: timeSlot,
                payment: payment,
                discount: discountPercent > 0 ? discountPercent + '%' : 'None',
                timestamp: new Date().toLocaleString('en-IN'),
                status: 'confirmed'
            };

            let allBookings = JSON.parse(localStorage.getItem('cityMateBookings') || '[]');
            allBookings.unshift(bookingData);
            localStorage.setItem('cityMateBookings', JSON.stringify(allBookings));
            localStorage.removeItem('tempBooking');

            alert('Booking confirmed! ID: ' + bookingData.id);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
