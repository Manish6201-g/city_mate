<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2><i class="fas fa-sign-in-alt"></i> City Mate Login</h2>
            
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('user')"><i class="fas fa-user"></i> User</button>
                <button class="tab-btn" onclick="switchTab('admin')"><i class="fas fa-users-cog"></i> Admin</button>
            </div>
            
            <!-- User Tab -->
            <div id="user-tab" class="tab-content active">
                <form id="userForm">
                    <div class="form-group">
                        <label>Email (demo: test@test.com)</label>
                        <input type="email" name="email" required>
                    </div>
                    <button type="submit" class="btn">Enter as Guest</button>
                </form>
                <div class="demo-data">
                    No password needed!
                </div>
            </div>
            
            <!-- Admin Tab -->
            <div id="admin-tab" class="tab-content">
                <form id="adminForm">
                    <div class="form-group">
                        <label>Password (demo: admin123)</label>
                        <input type="password" name="password" required>
                    </div>
                    <button type="submit" class="btn">Admin Login</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // Update tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        // User login
        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = new FormData(this).get('email');
            localStorage.setItem('cityMateUserRole', 'client');
            localStorage.setItem('cityMateEmail', email);
            window.location.href = 'index.html';
        });
        
        // Admin login
        document.getElementById('adminForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = new FormData(this).get('password');
            if (password === 'admin123') {
                localStorage.setItem('cityMateUserRole', 'admin');
                window.location.href = 'admin.html';
            } else {
                alert('Wrong password!');
            }
        });
        
        // Auto-redirect
        if (localStorage.getItem('cityMateUserRole')) {
            const role = localStorage.getItem('cityMateUserRole');
            window.location.href = role === 'admin' ? 'admin.html' : 'index.html';
        }
    </script>
</body>
</html>
