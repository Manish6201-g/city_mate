<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - City Mate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.3);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 2rem; color: var(--text-dark, #1e293b); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-dark); }
        .form-group input { width: 100%; padding: 1rem 1.2rem; border: 2px solid transparent; border-radius: 12px; font-size: 1rem; transition: all 0.3s ease; background: rgba(255,255,255,0.8); }
        .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
        .login-btn { width: 100%; padding: 1.2rem; font-size: 1.1rem; font-weight: 600; margin-top: 1rem; }
        .role-selector { margin: 1rem 0; }
        .role-btn { 
            flex: 1; padding: 1rem; margin: 0 0.5rem; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; 
        }
        .role-btn.active, .role-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .role-client { background: linear-gradient(45deg, #10b981, #059669); color: white; }
        .role-admin { background: linear-gradient(45deg, #8b5cf6, #7c3aed); color: white; }
        .demo-data { font-size: 0.85rem; color: #666; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2><i class="fas fa-sign-in-alt"></i> City Mate Login</h2>
            
            <div class="role-selector" style="display:flex;">
                <button class="role-btn role-client active" onclick="selectRole('client', this)">Client</button>
                <button class="role-btn role-admin" onclick="selectRole('admin', this)">Admin</button>
            </div>
            
            <form id="loginForm">
                <div class="form-group" id="emailGroup">
                    <label>Email* (demo: test@test.com)</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group" id="passwordGroup" style="display:none;">
                    <label>Password* (demo: admin123)</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn login-btn" id="loginBtn">Login as Client</button>
            </form>
            
            <div class="demo-data">
                Client: any email | Admin: admin123
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentRole = 'client';
        
        function selectRole(role, btn) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('loginBtn').textContent = `Login as ${role.charAt(0).toUpperCase() + role.slice(1)}`;
            document.getElementById('passwordGroup').style.display = role === 'admin' ? 'block' : 'none';
            if (role === 'client') {
                document.getElementById('password').removeAttribute('required');
            } else {
                document.getElementById('password').setAttribute('required', 'required');
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Demo validation
            if (currentRole === 'client' || (currentRole === 'admin' && password === 'admin123')) {
                localStorage.setItem('cityMateUserRole', currentRole);
                localStorage.setItem('cityMateEmail', email);
                
                // Redirect based on role
                if (currentRole === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert('Wrong password!');
            }
        });
        
        // Auto-redirect if already logged
        if (localStorage.getItem('cityMateUserRole')) {
            const role = localStorage.getItem('cityMateUserRole');
            if (role === 'admin') window.location.href = 'admin.html';
            else window.location.href = 'index.html';
        }
    </script>
</body>
</html>
